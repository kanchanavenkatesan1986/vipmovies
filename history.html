<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch History - VIP Movies</title>
    <meta name="description" content="Your recently watched movies on VIP Movies. Browse your viewing history.">

    <link rel="stylesheet" href="./src/main.css" />
    <script src="./src/api.js"></script>
    <script src="./src/main.js" defer></script>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;700&display=swap" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
        .page-hero {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.08) 0%, var(--bg-secondary) 100%);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: var(--border-radius);
            margin-bottom: 16px;
            text-align: center;
        }
        .page-hero h1 {
            font-size: clamp(20px, 4vw, 26px);
            font-weight: 700;
            color: #818cf8;
            margin-bottom: 6px;
        }
        .page-hero p {
            font-size: 13px;
            color: var(--text-secondary);
        }
        .hist-actions {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 8px;
        }
        .btn-clear {
            background: rgba(255, 23, 68, 0.08);
            color: var(--danger, #ff1744);
            border: 1px solid rgba(255, 23, 68, 0.2);
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 12px;
            font-weight: 600;
            font-family: 'Lexend', sans-serif;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
        }
        .btn-clear:hover {
            background: rgba(255, 23, 68, 0.15);
            border-color: var(--danger, #ff1744);
        }
        .empty-state {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
            gap: 16px;
        }
        .empty-state i {
            font-size: 52px;
            color: rgba(99, 102, 241, 0.3);
        }
        .empty-state h2 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .empty-state p {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
        }
        .empty-state a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, var(--accent), #d4a70f);
            color: #000;
            font-weight: 700;
            font-size: 14px;
            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            transition: var(--transition);
        }
        .empty-state a:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245,197,24,0.3);
        }
        .result-count {
            font-size: 12px;
            color: #818cf8;
            font-weight: 700;
            background: rgba(99, 102, 241, 0.1);
            padding: 4px 10px;
            border-radius: 8px;
            border: 1px solid rgba(99, 102, 241, 0.25);
            margin-bottom: 12px;
            display: inline-block;
        }
        .hist-time {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        .coming-soon-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: linear-gradient(135deg, #ff0040, #c2003b);
            color: #fff;
            font-size: 9px;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 3;
        }
    </style>
</head>

<body>
    <div class="main">

        <!-- Navigation Drawer (Overlay) -->
        <div id="myNav" class="overlay">
            <img src="./m-image/Close icon.png" class="close" onclick="closeNav()" alt="Close Menu">
            <img src="./m-image/VIP Movies.jpg" class="navimg" alt="VIP Movies">
            <div class="nav-menu">
                <a href="index.html" class="nav-link">
                    <i class="fa-solid fa-house"></i> Home
                </a>
                <a href="favorites.html" class="nav-link">
                    <i class="fa-solid fa-heart"></i> Favorites
                </a>
                <a href="setting.html" class="nav-link">
                    <i class="fa-solid fa-gear"></i> Setting
                </a>
                <a href="sub-pages/feedback.html" class="nav-link">
                    <i class="fa-solid fa-comment-dots"></i> Feedback
                </a>
                <a href="sub-pages/about.html" class="nav-link">
                    <i class="fa-solid fa-circle-info"></i> About
                </a>
            </div>
        </div>

        <!-- Header -->
        <div class="header">
            <img src="./m-image/Menu icon.png" class="menu" onclick="openNav()" alt="Menu">
            <img src="./m-image/Vip Title.png" class="title" alt="VIP Movies Logo" onclick="location.href='index.html'" style="cursor:pointer;">
            <a href="search.html">
                <img src="./m-image/Search icon.png" class="search" alt="Search">
            </a>
        </div>

        <!-- Hero Banner -->
        <div class="page-hero">
            <h1><i class="fa-solid fa-clock-rotate-left"></i> Watch History</h1>
            <p>Your recently watched movies — always available offline</p>
        </div>

        <!-- Actions Row -->
        <div class="hist-actions">
            <button class="btn-clear" id="clearHistBtn" onclick="clearHistory()" style="display:none;">
                <i class="fa-solid fa-trash-can"></i> Clear History
            </button>
        </div>

        <!-- Result Count -->
        <div id="resultCount" class="result-count" style="display:none;"></div>

        <!-- Movies Grid -->
        <div id="histGrid" class="movies-grid"></div>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state">
            <i class="fa-regular fa-clock"></i>
            <h2>No Watch History</h2>
            <p>Movies you watch will appear here automatically. Start exploring!</p>
            <a href="index.html"><i class="fa-solid fa-house"></i> Browse Movies</a>
        </div>

       <!-- Bottom Navigation Bar -->
        <div class="bottom-nav">
            <a href="index.html" class="bottom-nav-item">
                <i class="fa-solid fa-house"></i>
                <span>Home</span>
            </a>
            <a href="search.html" class="bottom-nav-item">
                <i class="fa-solid fa-magnifying-glass"></i>
                <span>Search</span>
            </a>
            <a href="years.html" class="bottom-nav-item">
                <i class="fa-solid fa-calendar-days"></i>
                <span>Years</span>
            </a>
            <a href="filter.html" class="bottom-nav-item">
                <i class="fa-solid fa-sliders"></i>
                <span>Filter</span>
            </a>
            <a href="history.html" class="bottom-nav-item">
                <i class="fa-solid fa-clock-rotate-left"></i>
                <span>History</span>
            </a>
    </div>

    <script>
        var histGrid   = document.getElementById('histGrid');
        var emptyState = document.getElementById('emptyState');
        var countEl    = document.getElementById('resultCount');
        var clearBtn   = document.getElementById('clearHistBtn');

        function timeAgo(ts) {
            var diff = Date.now() - ts;
            var m = Math.floor(diff / 60000);
            if (m < 1)  return 'Just now';
            if (m < 60) return m + 'm ago';
            var h = Math.floor(m / 60);
            if (h < 24) return h + 'h ago';
            var d = Math.floor(h / 24);
            if (d < 7)  return d + 'd ago';
            return new Date(ts).toLocaleDateString();
        }

        function renderHistoryCard(hist) {
            var movie = MovieRepository.getById(hist.movieId) || hist;
            var isComingSoon = (movie.status || '').toLowerCase() === 'coming soon';
            var movieType    = (movie.type || '').toLowerCase();
            var movieYear    = movie.year || '';

            var card = document.createElement('a');
            card.href      = 'watch.html?type=' + movieType + '&year=' + movieYear + '&id=' + (movie.id || hist.movieId);
            card.className = 'list-card-link';
            if (isComingSoon) { card.style.opacity = '0.45'; card.style.filter = 'grayscale(60%)'; }

            card.innerHTML =
                '<div class="list-card">' +
                    '<div class="list-card-img-wrapper">' +
                        '<img class="list-card-img" data-src="' + getMovieImageUrl(movie) + '" alt="' + (movie.title || '') + '" loading="lazy">' +
                        '<span class="list-card-badge">' + (movie.year || '-') + '</span>' +
                        (isComingSoon ? '<span class="coming-soon-badge">Coming Soon</span>' : '') +
                    '</div>' +
                    '<div class="list-card-details">' +
                        '<h3 class="list-card-title">' + (movie.title || 'Unknown') + '</h3>' +
                        '<p class="list-card-info">' + (movieType.charAt(0).toUpperCase() + movieType.slice(1) || '-') + '</p>' +
                        '<p class="hist-time"><i class="fa-regular fa-clock" style="font-size:10px;"></i> ' + timeAgo(hist.watchedAt) + '</p>' +
                    '</div>' +
                '</div>';

            return card;
        }

        function loadHistory() {
            AppLoader.init().then(function() {
                return HistoryRepository.getAll();
            }).then(function(hist) {
                histGrid.innerHTML = '';

                if (hist.length === 0) {
                    emptyState.style.display = 'flex';
                    countEl.style.display    = 'none';
                    clearBtn.style.display   = 'none';
                    return;
                }

                emptyState.style.display = 'none';
                countEl.style.display    = 'inline-block';
                clearBtn.style.display   = 'inline-flex';
                countEl.textContent      = hist.length + ' Watched';

                var scroller = new VirtualScroller(histGrid, hist, renderHistoryCard, { chunkSize: 20 });
                scroller.init();
            }).catch(function(err) {
                console.error('History load error:', err);
                UIManager.showOfflineOverlay(function() {
                    return AppLoader.forceRefresh().then(loadHistory);
                });
            });
        }

        function clearHistory() {
            if (!confirm('Clear your entire watch history? This cannot be undone.')) return;
            HistoryRepository.clearAll().then(function() {
                UIManager.showToast('Watch history cleared!');
                loadHistory();
            });
        }

        loadHistory();
    </script>

    <!-- Cloudflare Web Analytics -->
    <script defer src='https://static.cloudflareinsights.com/beacon.min.js'
        data-cf-beacon='{"token": "d56e216847a549828166c56d48a99585"}'></script>
</body>

</html>
