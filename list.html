<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie List - VIP Movies</title>
    
    <link rel="stylesheet" href="./src/main.css"/>
    <script src="./src/api.js"></script>
    <script src="./src/main.js" defer></script>
    
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;700&display=swap"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>
        .list-header {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin: 20px 0 16px 0;
            position: relative;
            padding-left: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .list-header::before {
            content: '';
            position: absolute;
            left: 0;
            top: 20%;
            height: 60%;
            width: 4px;
            background-color: var(--accent);
            border-radius: 2px;
        }

        .list-back-btn {
            font-size: 14px;
            color: var(--accent);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
            transition: var(--transition);
        }

        .list-back-btn:hover {
            color: var(--accent-hover);
            transform: translateX(-3px);
        }
    </style>
</head>
<body>

    <div class="main">

        <!-- Navigation Drawer (Overlay) -->
        <div id="myNav" class="overlay">
            <img src="./m-image/Close icon.png" class="close" onclick="closeNav()" alt="Close Menu">
            <img src="./m-image/VIP Movies.jpg" class="navimg" alt="VIP Movies">

            <div class="nav-menu">
               <a href="index.html" class="nav-link">
                    <i class="fa-solid fa-house"></i> Home
                </a>
                <a href="favorites.html" class="nav-link">
                    <i class="fa-solid fa-heart"></i> Favorites
                </a>
                <a href="setting.html" class="nav-link">
                    <i class="fa-solid fa-gear"></i> Setting
                </a>
                <a href="sub-pages/feedback.html" class="nav-link">
                    <i class="fa-solid fa-comment-dots"></i> Feedback
                </a>
                <a href="sub-pages/about.html" class="nav-link">
                    <i class="fa-solid fa-circle-info"></i> About
                </a>
            </div>
        </div>

        <!-- Header -->
        <div class="header">
            <img src="./m-image/Menu icon.png" class="menu" onclick="openNav()" alt="Menu">
            <img src="./m-image/Vip Title.png" class="title" alt="VIP Movies Logo" onclick="location.href='index.html'" style="cursor:pointer;">
            <a href="search.html">
                <img src="./m-image/Search icon.png" class="search" alt="Search">
            </a>
        </div>

        <!-- Dynamic Category Title -->
        <div class="list-header">
            <span id="listTitle">Movies Collection</span>
            <a href="index.html" class="list-back-btn">
                <i class="fa-solid fa-arrow-left"></i> Back to Home
            </a>
        </div>

        <!-- Top Pagination -->
        <div id="paginationTop" class="pagination-bar" style="display: none;"></div>

        <!-- Movie Listing Grid -->
        <div id="movieList" class="movies-grid"></div>

        <!-- Bottom Pagination -->
        <div id="paginationBottom" class="pagination-bar" style="display: none;"></div>

        <!-- Empty Listing Alert -->
        <div id="comingSoon" class="not-box" style="display: none;">
            <i class="fa-solid fa-hourglass-half" style="font-size: 38px; color: var(--accent); margin-bottom: 16px;"></i>
            <h1 class="note" style="line-height: 1.6;">Please Wait...<br>Coming Soon New Movies!</h1>
        </div>

        <!-- Bottom Navigation Bar -->
        <div class="bottom-nav">
            <a href="index.html" class="bottom-nav-item">
                <i class="fa-solid fa-house"></i>
                <span>Home</span>
            </a>
            <a href="search.html" class="bottom-nav-item">
                <i class="fa-solid fa-magnifying-glass"></i>
                <span>Search</span>
            </a>
            <a href="years.html" class="bottom-nav-item">
                <i class="fa-solid fa-calendar-days"></i>
                <span>Years</span>
            </a>
            <a href="filter.html" class="bottom-nav-item">
                <i class="fa-solid fa-sliders"></i>
                <span>Filter</span>
            </a>
            <a href="history.html" class="bottom-nav-item">
                <i class="fa-solid fa-clock-rotate-left"></i>
                <span>History</span>
            </a>

    </div>

<script>
    const params = new URLSearchParams(window.location.search);
    const type = params.get("type");
    const year = params.get("year");

    // Display appropriate title
    const listTitle = document.getElementById("listTitle");
    if(type && year) {
        listTitle.innerText = year + " " + type.charAt(0).toUpperCase() + type.slice(1) + " Movies";
    } else {
        listTitle.innerText = "Movies Collection";
    }

    if(!type || !year) {
        document.getElementById("comingSoon").style.display = "flex";
        document.getElementById("comingSoon").querySelector(".note").textContent = "Please select a type and year.";
    } else {
        function initListing() {
            var container = document.getElementById("movieList");
            var comingSoon = document.getElementById("comingSoon");
            var pagTop = document.getElementById("paginationTop");
            var pagBottom = document.getElementById("paginationBottom");
            container.innerHTML = "";

            // Query in-memory cache directly! No fetch!
            var movies = MovieStore.getByType(type).filter(function(m) {
                return String(m.year) === String(year);
            });

            if(movies.length === 0) {
                comingSoon.style.display = "flex";
                pagTop.style.display = "none";
                pagBottom.style.display = "none";
                return;
            }

            comingSoon.style.display = "none";

            // Sort movies: active first, coming soon last
            movies.sort(function(a, b) {
                var aComing = (a.status || "").toLowerCase() === "coming soon" ? 1 : 0;
                var bComing = (b.status || "").toLowerCase() === "coming soon" ? 1 : 0;
                return aComing - bComing;
            });

            var currentPage = 1;
            var moviesPerPage = 20;
            var totalMovies = movies.length;
            var totalPages = Math.ceil(totalMovies / moviesPerPage);

            function renderPage(page) {
                currentPage = page;
                container.innerHTML = "";

                var startIndex = (page - 1) * moviesPerPage;
                var endIndex = Math.min(startIndex + moviesPerPage, totalMovies);
                var pageMovies = movies.slice(startIndex, endIndex);

                var fragment = document.createDocumentFragment();

                pageMovies.forEach(function(movie) {
                    var isComingSoon = movie.status && movie.status.toLowerCase() === "coming soon";

                    var card = document.createElement("a");
                    card.href = "watch.html?type=" + type + "&year=" + year + "&id=" + movie.id;
                    card.className = "list-card-link";

                    var extraCardClass = isComingSoon ? " coming-soon" : "";
                    var displayType = type.charAt(0).toUpperCase() + type.slice(1);

                    card.innerHTML =
                        '<div class="list-card' + extraCardClass + '">' +
                            '<div class="list-card-img-wrapper">' +
                                '<img class="list-card-img" data-src="' + getMovieImageUrl(movie) + '" alt="' + movie.title + '" loading="lazy">' +
                                (isComingSoon ? '<span class="coming-soon-badge">Coming Soon</span>' : '') +
                            '</div>' +
                            '<div class="list-card-details">' +
                                '<div class="list-card-header">' +
                                    '<h3 class="list-card-title">' + movie.title + '</h3>' +
                                    '<span class="list-card-year">' + (movie.year || year) + '</span>' +
                                '</div>' +
                                '<p class="list-card-info">Release : ' + (movie.release || '-') + '</p>' +
                                '<p class="list-card-info">Language : ' + (movie.language || displayType) + '</p>' +
                                '<div class="list-card-action">' +
                                    (isComingSoon ? '<i class="fa-solid fa-lock"></i> Watch Ads - Unlock' : 'Watch Ads - Unlock <i class="fa-solid fa-arrow-right"></i>') +
                                '</div>' +
                            '</div>' +
                        '</div>';

                    fragment.appendChild(card);
                });

                requestAnimationFrame(function() {
                    container.appendChild(fragment);
                    lazyLoadImages();
                });

                updatePaginationUI(pagTop);
                updatePaginationUI(pagBottom);
            }

            function updatePaginationUI(pagBar) {
                if (totalPages <= 1) {
                    pagBar.style.display = "none";
                    return;
                }
                pagBar.style.display = "flex";

                var startIndex = (currentPage - 1) * moviesPerPage + 1;
                var endIndex = Math.min(startIndex + moviesPerPage - 1, totalMovies);

                var countText = '<div class="pag-count">Showing ' + startIndex + ' to ' + endIndex + ' of ' + totalMovies + ' Movies</div>';

                var prevBtn = '';
                if (currentPage > 1) {
                    prevBtn = '<button class="pag-btn prev-btn" onclick="goToPage(' + (currentPage - 1) + ')"><i class="fa-solid fa-chevron-left"></i></button>';
                } else {
                    prevBtn = '<button class="pag-btn prev-btn disabled" disabled><i class="fa-solid fa-chevron-left"></i></button>';
                }

                var middleContent = '<div class="pag-middle">';
                middleContent += countText;
                middleContent += '<div class="pag-numbers">';
                
                var range = 1;
                for (var i = 1; i <= totalPages; i++) {
                    if (i === 1 || i === totalPages || (i >= currentPage - range && i <= currentPage + range)) {
                        if (i === currentPage) {
                            middleContent += '<button class="pag-num-btn active">' + i + '</button>';
                        } else {
                            middleContent += '<button class="pag-num-btn" onclick="goToPage(' + i + ')">' + i + '</button>';
                        }
                    } else if (i === currentPage - range - 1 || i === currentPage + range + 1) {
                        middleContent += '<span class="pag-dots">...</span>';
                    }
                }
                middleContent += '</div>';
                middleContent += '</div>';

                var nextBtn = '';
                if (currentPage < totalPages) {
                    nextBtn = '<button class="pag-btn next-btn" onclick="goToPage(' + (currentPage + 1) + ')"><i class="fa-solid fa-chevron-right"></i></button>';
                } else {
                    nextBtn = '<button class="pag-btn next-btn disabled" disabled><i class="fa-solid fa-chevron-right"></i></button>';
                }

                pagBar.innerHTML = prevBtn + middleContent + nextBtn;
            }

            window.goToPage = function(pageNumber) {
                if (pageNumber >= 1 && pageNumber <= totalPages) {
                    renderPage(pageNumber);
                    window.scrollTo({ top: container.offsetTop - 80, behavior: 'smooth' });
                }
            };

            renderPage(1);
        }

        AppLoader.init()
            .then(initListing)
            .catch(function(err) {
                console.error("Error loading movie listing:", err);
                showOfflineOverlay(function() {
                    return AppLoader.forceRefresh().then(function() {
                        window.location.reload();
                    });
                });
            });
    }
</script>

<style>
    /* Container Override */
    #movieList.movies-grid {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    /* Horizontal Card Structure */
    .list-card {
        display: flex;
        flex-direction: row;
        background-color: var(--bg-secondary);
        border-radius: var(--border-radius);
        border: 1px solid rgba(255, 255, 255, 0.05);
        overflow: hidden;
        transition: var(--transition);
        padding: 8px;
        gap: 12px;
        align-items: stretch;
    }

    .list-card:hover {
        transform: translateY(-3px);
        border-color: rgba(245, 197, 24, 0.3);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5);
    }

    /* Coming Soon Card Styling */
    .list-card.coming-soon {
        border-color: rgba(255, 23, 68, 0.15);
        opacity: 0.6;
    }

    .list-card.coming-soon .list-card-img {
        opacity: 0.5;
        filter: grayscale(70%);
    }

    .list-card.coming-soon .list-card-title {
        opacity: 0.55;
        color: var(--text-secondary);
    }

    .list-card.coming-soon .list-card-year {
        opacity: 0.45;
    }

    .list-card.coming-soon .list-card-info {
        opacity: 0.4;
    }

    .list-card.coming-soon .list-card-action {
        color: var(--text-muted);
        opacity: 0.45;
    }

    /* Image Wrapper and Image */
    .list-card-img-wrapper {
        position: relative;
        width: 115px;
        aspect-ratio: 2 / 3;
        overflow: hidden;
        background-color: #121214;
        border-radius: 8px;
        flex-shrink: 0;
    }

    .list-card-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.5s ease;
    }

    .list-card:not(.coming-soon):hover .list-card-img {
        transform: scale(1.06);
    }

    /* Details Container */
    .list-card-details {
        display: flex;
        flex-direction: column;
        flex-grow: 1;
        position: relative;
        padding: 2px 0;
    }

    /* Header Row for Title and Year Badge */
    .list-card-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 10px;
        margin-bottom: 6px;
    }

    .list-card-title {
        font-size: 16px;
        font-weight: 700;
        color: var(--text-primary);
        line-height: 1.3;
        margin: 0;
        white-space: normal;
        overflow: visible;
        text-overflow: clip;
    }

    /* Year Badge next to Title */
    .list-card-year {
        border: 2px solid var(--accent);
        color: var(--accent);
        font-weight: 700;
        font-size: 12px;
        padding: 2px 8px;
        border-radius: 6px;
        flex-shrink: 0;
    }

    /* Info Paragraphs */
    .list-card-info {
        font-size: 13px;
        color: var(--text-secondary);
        margin: 2px 0;
    }

    /* Watch Ads Action Link */
    .list-card-action {
        margin-top: auto;
        font-size: 14px;
        font-weight: 700;
        color: var(--success);
        display: flex;
        align-items: center;
        gap: 5px;
        align-self: flex-end;
        transition: var(--transition);
        text-decoration: none;
    }

    .list-card:not(.coming-soon):hover .list-card-action {
        color: var(--success-hover);
        transform: scale(1.02);
    }

    /* Ultra high visibility coming soon badge */
    .coming-soon-badge {
        position: absolute;
        top: 6px;
        left: 50%;
        transform: translateX(-50%);
        background: linear-gradient(135deg, #ff1744, #d500f9);
        color: #ffffff;
        font-size: 9px;
        font-weight: 800;
        padding: 5px 9px;
        border-radius: 4px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        z-index: 5;
        box-shadow: 0 0 14px rgba(255, 23, 68, 0.85), 0 2px 6px rgba(0,0,0,0.6);
        animation: cs-pulse 1.6s ease-in-out infinite;
        border: 1px solid rgba(255,255,255,0.4);
        white-space: nowrap;
        display: inline-block;
    }

    @keyframes cs-pulse {
        0%, 100% { 
            box-shadow: 0 0 8px rgba(255,23,68,0.7), 0 2px 6px rgba(0,0,0,0.6); 
            transform: translateX(-50%) scale(1);
        }
        50% { 
            box-shadow: 0 0 20px rgba(255,23,68,1), 0 2px 6px rgba(0,0,0,0.6);
            transform: translateX(-50%) scale(1.04);
        }
    }

    /* Responsive adjustments for Mobile */
    @media (max-width: 480px) {
        .list-card {
            padding: 6px;
            gap: 10px;
        }
        .list-card-img-wrapper {
            width: 90px;
        }
        .list-card-title {
            font-size: 14px;
        }
        .list-card-year {
            font-size: 12px;
            padding: 2px 6px;
            border-width: 2px;
        }
        .list-card-info {
            font-size: 11px;
            margin: 1px 0;
        }
        .list-card-action {
            font-size: 12px;
        }
        .coming-soon-badge {
            font-size: 8px;
            padding: 4px 7px;
            top: 4px;
            left: 50%;
            transform: translateX(-50%);
        }
    }

    /* Pagination Styling */
    .pagination-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        padding: 8px 12px;
        background-color: var(--bg-secondary);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: var(--border-radius);
        margin: 8px 0;
        gap: 12px;
    }

    .pag-middle {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
        flex-grow: 1;
    }

    .pag-count {
        font-size: 13px;
        font-weight: 500;
        color: var(--text-secondary);
    }

    .pag-numbers {
        display: flex;
        align-items: center;
        gap: 6px;
    }

    /* Far-left & Far-right chevron buttons style */
    .pag-btn.prev-btn,
    .pag-btn.next-btn {
        background-color: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--text-primary);
        font-size: 16px;
        border-radius: 10px;
        cursor: pointer;
        transition: var(--transition);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 44px;
        height: 44px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .pag-btn.prev-btn:hover:not(.disabled),
    .pag-btn.next-btn:hover:not(.disabled) {
        background-color: rgba(245, 197, 24, 0.12);
        border-color: var(--accent);
        color: var(--accent);
        box-shadow: 0 4px 12px rgba(245, 197, 24, 0.15);
    }

    .pag-btn.disabled {
        opacity: 0.25;
        cursor: not-allowed;
    }

    /* Numeric page numbers style */
    .pag-num-btn {
        background-color: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.06);
        color: var(--text-secondary);
        font-size: 13px;
        font-weight: 600;
        border-radius: 6px;
        cursor: pointer;
        transition: var(--transition);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 32px;
        height: 32px;
    }

    .pag-num-btn:hover:not(.active) {
        background-color: rgba(255, 255, 255, 0.06);
        border-color: var(--text-secondary);
        color: var(--text-primary);
    }

    .pag-num-btn.active {
        background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
        color: #ffffff;
        border-color: #8b5cf6;
        box-shadow: 0 0 8px rgba(139, 92, 246, 0.3);
        cursor: default;
    }

    .pag-dots {
        color: var(--text-muted);
        font-weight: 700;
        font-size: 14px;
        padding: 0 4px;
    }

    #paginationBottom {
        margin-bottom: 12px;
    }

    /* Mobile responsive pagination */
    @media (max-width: 580px) {
        .pagination-bar {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            padding: 8px;
            gap: 8px;
        }
        
        .pag-middle {
            flex-direction: column;
            gap: 6px;
            width: 100%;
        }

        .pag-btn.prev-btn,
        .pag-btn.next-btn {
            min-width: 38px;
            height: 38px;
            font-size: 14px;
        }

        .pag-count {
            font-size: 12px;
            text-align: center;
        }

        .pag-num-btn {
            min-width: 28px;
            height: 28px;
            font-size: 11px;
            border-radius: 4px;
        }
    }
</style>
