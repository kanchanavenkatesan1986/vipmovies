    <script>
        // Slider & Movies — all read from IndexedDB via AppLoader
        var index = 0;

        function renderSlider(sliderData) {
            var slidesContainer = document.getElementById("slidesContainer");
            var dotContainer    = document.getElementById("dot");
            slidesContainer.innerHTML = '';
            dotContainer.innerHTML    = '';
            if (!sliderData || sliderData.length === 0) return;
            sliderData.forEach(function (item, i) {
                slidesContainer.innerHTML +=
                    '<a href="' + item.url + '">' +
                    '<div class="slides">' +
                    '<img class="imggg" src="' + item.image + '" alt="Slide">' +
                    '</div>' +
                    '</a>';
                dotContainer.innerHTML += '<span class="dot" onclick="setSlide(' + i + ')"></span>';
            });
            startSlider();
        }

        var changeSlideTimeout;
        function startSlider() {
            var slides = document.querySelectorAll(".slides");
            if (slides.length === 0) return;
            function changeSlide() {
                if (index >= slides.length) index = 0;
                showSlide(index);
                index++;
                changeSlideTimeout = setTimeout(changeSlide, 3500);
            }
            changeSlide();
        }

        function showSlide(n) {
            var slides = document.querySelectorAll(".slides");
            var dots = document.querySelectorAll(".dot");
            if (slides.length === 0) return;
            slides.forEach(function (slide, i) {
                slide.style.display = "none";
                dots[i].classList.remove("active");
            });
            slides[n].style.display = "block";
            dots[n].classList.add("active");
        }

        function setSlide(n) {
            clearTimeout(changeSlideTimeout);
            index = n;
            showSlide(n);
            index++;
            changeSlideTimeout = setTimeout(function () {
                var slides = document.querySelectorAll(".slides");
                if (index >= slides.length) index = 0;
                showSlide(index);
                index++;
            }, 3500);
        }

        function filterMovie(type, year) {
            location.href = "list.html?type=" + type + "&year=" + year;
        }

        function renderPageData() {
            // Load Tamil 2026 movies
            loadSection("tamil", "2026", "tamilMovies");
            // Load Hollywood 2026 movies
            loadSection("hollywood", "2026", "hollywoodMovies");
        }

        AppLoader.init()
            .then(function() {
                renderSlider(MovieRepository.getSlider());
                renderPageData();
            })
            .catch(function(err) {
                console.error("Failed to load app data:", err);
                showOfflineOverlay(function() {
                    return AppLoader.forceRefresh().then(function() {
                        renderSlider(MovieRepository.getSlider());
                        renderPageData();
                    });
                });
            });

        function loadSection(type, year, containerId) {
            var container = document.getElementById(containerId);
            container.innerHTML = "";

            var movies = MovieStore.getByType(type).filter(function(m) {
    return (
        String(m.year) === String(year) &&
        String(m.status).toLowerCase() === "active"
    );
});

var shown = movies.slice(0, 10);
            var fragment = document.createDocumentFragment();

            shown.forEach(function (movie) {
                var card = document.createElement("a");
                card.href = "watch.html?type=" + type + "&year=" + year + "&id=" + movie.id;
                card.className = "movie-card-link";

                var box = document.createElement("div");
                box.className = "movie-card";

                var imgWrapper = document.createElement("div");
                imgWrapper.className = "movie-card-img-wrapper";

                var img = document.createElement("img");
                img.className = "movie-card-img";
                img.setAttribute("data-src", getMovieImageUrl(movie));
                img.alt = movie.title;
                img.loading = "lazy";

                imgWrapper.appendChild(img);

                var title = document.createElement("h1");
                title.className = "movie-card-title";
                title.innerText = movie.title;

                box.appendChild(imgWrapper);
                box.appendChild(title);
                card.appendChild(box);
                fragment.appendChild(card);
            });

            // VIEW ALL CARD
            var viewCard = document.createElement("div");
            viewCard.className = "view-all-card";
            viewCard.onclick = function () { filterMovie(type, year); };
            viewCard.innerHTML =
                '<div class="view-all-icon"><i class="fa-solid fa-arrow-right"></i></div>' +
                '<div class="view-all-text">View All</div>';
            fragment.appendChild(viewCard);

            requestAnimationFrame(function() {
                container.appendChild(fragment);
                lazyLoadImages();
            });
        }
    </script>
